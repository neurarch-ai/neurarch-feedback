<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Blue dominates 0-60%, purple only in the lower-right corner.
         At full size (e.g. AuthModal 32px) reads like a smooth blue→purple
         gradient. At 16px favicon size, blue stays clearly blue. -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4f9eff"/>
      <stop offset="60%"  stop-color="#4f9eff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <path d="M 9.5 23 L 9.5 9 L 22.5 23 L 22.5 9"
    stroke="#ffffff" stroke-width="2.6"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>
</svg>
