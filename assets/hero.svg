<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07091a"/>
      <stop offset="100%" style="stop-color:#0d0f24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(167,139,250,0.12)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow blobs -->
  <ellipse cx="280" cy="220" rx="300" ry="220" fill="#7c3aed" opacity="0.07" filter="url(#glow)"/>
  <ellipse cx="960" cy="430" rx="260" ry="180" fill="#a78bfa" opacity="0.08" filter="url(#glow)"/>

  <!-- Canvas preview (right side) -->
  <g transform="translate(680, 90)" opacity="0.85">
    <!-- Card nodes -->
    <rect x="0"   y="0"   width="190" height="72" rx="10" fill="#0d0f1e" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="2"   y="2"   width="4"   height="68" rx="2"  fill="#a78bfa" opacity="0.7"/>
    <text x="20"  y="26"  font-family="monospace" font-size="11" fill="#64748b">INPUT</text>
    <text x="20"  y="44"  font-family="monospace" font-size="13" fill="#c0d8f0" font-weight="bold">input_ids</text>
    <text x="20"  y="60"  font-family="monospace" font-size="10" fill="#475569">seq_len=512</text>

    <rect x="0"   y="108" width="190" height="88" rx="10" fill="#0d0f1e" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="2"   y="110" width="4"   height="84" rx="2"  fill="#f97316" opacity="0.7"/>
    <text x="20"  y="134" font-family="monospace" font-size="11" fill="#64748b">EMBEDDING</text>
    <text x="20"  y="152" font-family="monospace" font-size="13" fill="#c0d8f0" font-weight="bold">token_embed</text>
    <text x="20"  y="168" font-family="monospace" font-size="10" fill="#475569">vocab=30k  dim=512</text>
    <text x="20"  y="183" font-family="monospace" font-size="10" fill="#3b82f6">~15.4M params</text>

    <rect x="0"   y="232" width="190" height="88" rx="10" fill="#0d0f1e" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="2"   y="234" width="4"   height="84" rx="2"  fill="#10b981" opacity="0.7"/>
    <text x="20"  y="258" font-family="monospace" font-size="11" fill="#64748b">TRANSFORMER</text>
    <text x="20"  y="276" font-family="monospace" font-size="13" fill="#c0d8f0" font-weight="bold">encoder_0</text>
    <text x="20"  y="292" font-family="monospace" font-size="10" fill="#475569">heads=8  d=512</text>
    <text x="20"  y="307" font-family="monospace" font-size="10" fill="#3b82f6">~4.2M params</text>

    <rect x="0"   y="356" width="190" height="72" rx="10" fill="#0d0f1e" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
    <rect x="2"   y="358" width="4"   height="68" rx="2"  fill="#a78bfa" opacity="0.7"/>
    <text x="20"  y="382" font-family="monospace" font-size="11" fill="#64748b">LINEAR</text>
    <text x="20"  y="400" font-family="monospace" font-size="13" fill="#c0d8f0" font-weight="bold">classifier</text>
    <text x="20"  y="416" font-family="monospace" font-size="10" fill="#475569">out=4 classes</text>

    <!-- Connections -->
    <line x1="95" y1="72"  x2="95" y2="108" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="95" y1="196" x2="95" y2="232" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <line x1="95" y1="320" x2="95" y2="356" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

    <!-- Health dots -->
    <circle cx="168" cy="148" r="5" fill="#10b981"/>
    <circle cx="168" cy="272" r="5" fill="#10b981"/>
    <circle cx="168" cy="390" r="5" fill="#a78bfa"/>

    <!-- ✓ lint badge -->
    <rect x="0" y="454" width="190" height="26" rx="6" fill="rgba(110,231,183,0.08)" stroke="rgba(110,231,183,0.25)" stroke-width="1"/>
    <text x="12" y="471" font-family="monospace" font-size="11" fill="#6ee7b7">✓ 0 lint errors · val_acc 87.3%</text>
  </g>

  <!-- Left side: brand + copy -->
  <text x="80" y="168" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="62" font-weight="800" letter-spacing="-2" fill="white">Neur<tspan fill="url(#accent)">arch</tspan></text>

  <text x="80" y="220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="21" fill="#7a9bbf" letter-spacing="-0.3">AI-native neural architecture design</text>
  <text x="80" y="252" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" fill="#475569">Problem description → PyTorch code in minutes</text>

  <!-- Feature pills -->
  <g transform="translate(80, 298)">
    <rect width="192" height="34" rx="17" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="16" y="22" font-family="-apple-system,sans-serif" font-size="13" fill="#a78bfa">✦ AI architecture agent</text>
  </g>
  <g transform="translate(286, 298)">
    <rect width="166" height="34" rx="17" fill="rgba(110,231,183,0.08)" stroke="rgba(110,231,183,0.25)" stroke-width="1"/>
    <text x="16" y="22" font-family="-apple-system,sans-serif" font-size="13" fill="#6ee7b7">▶ GPU training</text>
  </g>
  <g transform="translate(80, 346)">
    <rect width="175" height="34" rx="17" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
    <text x="16" y="22" font-family="-apple-system,sans-serif" font-size="13" fill="#a78bfa">⌨ PyTorch / ONNX export</text>
  </g>
  <g transform="translate(269, 346)">
    <rect width="168" height="34" rx="17" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
    <text x="16" y="22" font-family="-apple-system,sans-serif" font-size="13" fill="#fbbf24">🔍 14-rule linter</text>
  </g>

  <!-- URL badge -->
  <g transform="translate(80, 410)">
    <rect width="168" height="28" rx="14" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <circle cx="18" cy="14" r="5" fill="#a78bfa"/>
    <text x="30" y="19" font-family="-apple-system,sans-serif" font-size="12" font-weight="700" fill="#a78bfa">neurarch.com · free</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)" opacity="0.6"/>
</svg>
