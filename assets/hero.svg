<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400" role="img" aria-label="Neurarch — Visual AI/ML studio">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07091a"/>
      <stop offset="100%" style="stop-color:#0d0f24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(167,139,250,0.12)"/>
    </pattern>
  </defs>

  <!-- Background + dot grid -->
  <rect width="1600" height="400" fill="url(#bg)"/>
  <rect width="1600" height="400" fill="url(#dots)"/>

  <!-- Soft glow blobs -->
  <ellipse cx="1180" cy="200" rx="480" ry="260" fill="#7c3aed" opacity="0.10" filter="url(#glow)"/>
  <ellipse cx="200" cy="360" rx="360" ry="200" fill="#a78bfa" opacity="0.06" filter="url(#glow)"/>

  <!-- Brand wordmark -->
  <text x="80" y="170" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif" font-size="92" font-weight="800" letter-spacing="-3" fill="white">Neur<tspan fill="url(#accent)">arch</tspan></text>

  <!-- Tagline -->
  <text x="84" y="216" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif" font-size="22" fill="#7a9bbf" letter-spacing="-0.3">Visual AI/ML studio — design, train, and ship without the boilerplate.</text>

  <!-- Feature pills -->
  <g transform="translate(84, 260)">
    <rect width="194" height="36" rx="18" fill="rgba(167,139,250,0.10)" stroke="rgba(167,139,250,0.32)" stroke-width="1"/>
    <text x="18" y="23" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#a78bfa" font-weight="500">✦ AI architecture agent</text>
  </g>
  <g transform="translate(290, 260)">
    <rect width="172" height="36" rx="18" fill="rgba(110,231,183,0.08)" stroke="rgba(110,231,183,0.26)" stroke-width="1"/>
    <text x="18" y="23" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#6ee7b7" font-weight="500">▶ Cloud GPU training</text>
  </g>
  <g transform="translate(474, 260)">
    <rect width="210" height="36" rx="18" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.24)" stroke-width="1"/>
    <text x="18" y="23" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#fbbf24" font-weight="500">⌨ One-click PyTorch export</text>
  </g>

  <!-- URL badge -->
  <g transform="translate(84, 318)">
    <rect width="190" height="28" rx="14" fill="rgba(167,139,250,0.14)" stroke="rgba(167,139,250,0.34)" stroke-width="1"/>
    <circle cx="18" cy="14" r="5" fill="#a78bfa"/>
    <text x="32" y="19" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#a78bfa">neurarch.com · free to start</text>
  </g>

  <!-- Mini canvas preview (right side) -->
  <g transform="translate(1060, 110)" opacity="0.94">
    <!-- Node 1: Input -->
    <rect x="0" y="40" width="138" height="92" rx="10" fill="#0d0f1e" stroke="rgba(167,139,250,0.45)" stroke-width="1.5"/>
    <rect x="2" y="42" width="4" height="88" rx="2" fill="#a78bfa" opacity="0.75"/>
    <text x="20" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#64748b">INPUT</text>
    <text x="20" y="86" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#c0d8f0" font-weight="bold">images</text>
    <text x="20" y="103" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#475569">3 × 224 × 224</text>
    <circle cx="122" cy="58" r="4" fill="#10b981"/>

    <!-- Connection 1 -->
    <line x1="138" y1="86" x2="174" y2="86" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.55"/>
    <polygon points="174,82 182,86 174,90" fill="#a78bfa" fill-opacity="0.55"/>

    <!-- Node 2: Conv -->
    <rect x="182" y="40" width="138" height="92" rx="10" fill="#0d0f1e" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>
    <rect x="184" y="42" width="4" height="88" rx="2" fill="#f97316" opacity="0.75"/>
    <text x="202" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#64748b">CONV2D</text>
    <text x="202" y="86" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#c0d8f0" font-weight="bold">conv_block</text>
    <text x="202" y="103" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#475569">k=3 · pad=1</text>
    <text x="202" y="118" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#3b82f6">~37k params</text>
    <circle cx="304" cy="58" r="4" fill="#10b981"/>

    <!-- Connection 2 -->
    <line x1="320" y1="86" x2="356" y2="86" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
    <polygon points="356,82 364,86 356,90" fill="rgba(255,255,255,0.28)"/>

    <!-- Node 3: Linear -->
    <rect x="364" y="40" width="138" height="92" rx="10" fill="#0d0f1e" stroke="rgba(110,231,183,0.42)" stroke-width="1.5"/>
    <rect x="366" y="42" width="4" height="88" rx="2" fill="#10b981" opacity="0.75"/>
    <text x="384" y="66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#64748b">LINEAR</text>
    <text x="384" y="86" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#c0d8f0" font-weight="bold">classifier</text>
    <text x="384" y="103" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#475569">out = 10</text>
    <circle cx="486" cy="58" r="4" fill="#a78bfa"/>

    <!-- Status badge -->
    <rect x="0" y="160" width="502" height="28" rx="6" fill="rgba(110,231,183,0.08)" stroke="rgba(110,231,183,0.26)" stroke-width="1"/>
    <circle cx="16" cy="174" r="4" fill="#6ee7b7"/>
    <text x="28" y="178" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#6ee7b7">✓ shapes verified · 0 lint errors · ready to export</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="396" width="1600" height="4" fill="url(#accent)" opacity="0.65"/>
</svg>
